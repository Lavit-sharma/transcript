name: Download YouTube Transcript

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Create Cookies File
        env:
          COOKIE_JSON_DATA: ${{ secrets.YOUTUBE_JSON }}
        run: python convert_cookies.py

      - name: Download Transcript
        run: |
          # --ignore-no-formats-error: Fixes the 'Requested format is not available' error
          # --write-subs: Checks for manually uploaded captions
          # --write-auto-subs: Checks for AI-generated captions
          # --sub-lang "en.*,hi.*": Tries English then Hindi variations
          yt-dlp --cookies cookies.txt \
                 --skip-download \
                 --ignore-no-formats-error \
                 --write-subs \
                 --write-auto-subs \
                 --sub-lang "en.*,hi.*" \
                 --convert-subs srt \
                 "https://www.youtube.com/watch?v=YED8zVXc6As" \
                 -o "transcript"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use a wildcard to find the generated subtitle file (e.g., transcript.en.srt)
          FILE=$(ls transcript*.srt | head -n 1)
          
          if [ -n "$FILE" ] && [ -f "$FILE" ]; then
            echo "Found transcript file: $FILE"
            mv "$FILE" transcript.srt
            git add transcript.srt
            git commit -m "Automated transcript update via yt-dlp"
            git push
          else
            echo "Error: No transcript file (.srt) was found."
            exit 1
          fi
