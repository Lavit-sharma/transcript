name: Download YouTube Transcript

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Create Cookies File
        env:
          COOKIE_JSON_DATA: ${{ secrets.YOUTUBE_JSON }}
        run: python convert_cookies.py

      - name: Download Transcript
        run: |
          # --user-agent: Mimics a real Chrome browser
          # --extractor-args: Forces yt-dlp to use the Android/iOS API which has higher limits
          # --sleep-subtitles: Adds a small delay to avoid triggering bots
          yt-dlp --cookies cookies.txt \
                 --skip-download \
                 --ignore-no-formats-error \
                 --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                 --extractor-args "youtube:player_client=android,web" \
                 --write-auto-subs \
                 --sub-lang "en.*,hi.*" \
                 --convert-subs srt \
                 "https://www.youtube.com/watch?v=YED8zVXc6As" \
                 -o "transcript"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          FILE=$(ls transcript*.srt | head -n 1)
          
          if [ -n "$FILE" ] && [ -f "$FILE" ]; then
            mv "$FILE" transcript.srt
            git add transcript.srt
            git commit -m "Bypassed 429 error with client spoofing"
            git push
          else
            echo "Transcript file not found. If the 429 error persists, wait 1 hour and try again."
            exit 1
          fi
