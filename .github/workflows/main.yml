name: Scrape YouTube via Selenium

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Selenium and Webdriver
        run: |
          pip install selenium webdriver-manager

      - name: Run Scraper
        run: python my.py

      - name: Commit Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f transcript.txt ]; then
            git add transcript.txt
            git commit -m "Scraped transcript via Selenium"
            git push
          fi
