name: Get Transcript via yt-dlp

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      # This decodes the Base64 string back into a perfectly formatted file
      - name: Create Cookies File
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES_BASE64 }}" | base64 --decode > cookies.txt

      - name: Download Transcript
        run: |
          yt-dlp --cookies cookies.txt \
                 --skip-download \
                 --write-auto-subs \
                 --sub-lang "en.*" \
                 --convert-subs srt \
                 "https://www.youtube.com/watch?v=YED8zVXc6As" \
                 -o "transcript"

      - name: Commit Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Find the generated .srt file
          FILE=$(ls transcript*.srt | head -n 1)
          
          if [ -f "$FILE" ]; then
            # Rename it to a simple name
            mv "$FILE" transcript.srt
            git add transcript.srt
            git commit -m "Downloaded transcript via yt-dlp (Base64 Fix)"
            git push
          else
            echo "No transcript file found. Check if the video has captions."
            exit 1
          fi
