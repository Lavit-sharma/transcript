name: Auto Download Transcript

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "youtube-transcript-api>=1.2.4"

      # THIS STEP CONVERTS YOUR SECRET TO A FILE
      - name: Create Cookies File from Secret
        run: echo '${{ secrets.YOUTUBE_JSON }}' > cookies.json

      - name: Execute Script
        run: python my.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # We add -A but we should EXCLUDE cookies.json so it never gets committed to git
          git add transcript.txt
          
          if git diff --staged --quiet; then
            echo "No changes in transcript."
          else
            git commit -m "Updated transcript via Secure Secrets"
            git push
          fi
