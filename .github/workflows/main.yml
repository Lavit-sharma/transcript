name: Get Transcript via yt-dlp

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      # This version uses a specialized way to write the secret without adding extra lines
      - name: Create Cookies File
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES_NETSCAPE }}" > cookies.txt
          # Remove any leading/trailing empty lines that might break the format
          sed -i '/^$/d' cookies.txt

      - name: Download Transcript
        run: |
          # We use --cookies to authenticate
          # We use --write-subs (manual) and --write-auto-subs (automatic)
          yt-dlp --cookies cookies.txt \
                 --skip-download \
                 --write-subs \
                 --write-auto-subs \
                 --sub-lang "en.*" \
                 --convert-subs srt \
                 "https://www.youtube.com/watch?v=YED8zVXc6As" \
                 -o "transcript"

      - name: Commit Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Check for any .srt file (could be transcript.en.srt or transcript.en-US.srt)
          if ls transcript.*.srt 1> /dev/null 2>&1; then
            git add transcript.*.srt
            git commit -m "Downloaded transcript via yt-dlp"
            git push
          else
            echo "No transcript file found."
            exit 1
          fi
