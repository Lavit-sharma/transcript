name: Auto Download Transcript

on:
  workflow_dispatch: # Manual Run Button
  push:
    branches: [ main ]

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "youtube-transcript-api>=1.2.4"

      # Securely create cookies.json from your GitHub Secret
      - name: Create Cookies File
        run: |
          cat <<EOF > cookies.json
          ${{ secrets.YOUTUBE_JSON }}
          EOF

      - name: Execute Script
        run: python my.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only add the transcript, never the cookies!
          if [ -f transcript.txt ]; then
            git add transcript.txt
            git commit -m "Automated transcript update" || echo "No changes to commit"
            git push
          else
            echo "transcript.txt was not generated."
            exit 1
          fi
