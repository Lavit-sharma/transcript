name: Auto Download Transcript

on:
  workflow_dispatch: # This adds a "Run" button in the GitHub Actions tab
  push:
    branches: [ main ] # Runs automatically when you push code

jobs:
  run-automation:
    runs-on: ubuntu-latest
    
    # Give the action permission to write the file back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Script
        run: python transcript.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add transcript.txt
          git commit -m "Automated transcript update" || echo "No changes to commit"
          git push
