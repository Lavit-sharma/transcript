name: Fetch Transcript

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ✅ Install ONLY chromedriver (Chromium already exists)
      - name: Install Chromium Driver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-chromedriver

      # ✅ Debug paths (IMPORTANT)
      - name: Verify Browser
        run: |
          which chromium-browser || true
          which chromium || true
          which chromedriver
          chromedriver --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymysql selenium

      - name: Run script
        run: python my.py "https://www.youtube.com/watch?v=huW5sxhm3ow"

      - name: Upload transcript
        uses: actions/upload-artifact@v4
        with:
          name: transcript
          path: transcript.txt
