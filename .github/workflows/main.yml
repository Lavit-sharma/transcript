name: Auto Download Transcript

on:
  workflow_dispatch: # Manual run button
  push:
    branches: [ main ] # Runs on every push

jobs:
  run-automation:
    runs-on: ubuntu-latest
    
    # 1. CRITICAL: Give the bot permission to write to your repo
    permissions:
      contents: write

    steps:
      # 2. Check out the code so the script is available
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 3. Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 4. Install the library (using quotes to avoid file creation errors)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "youtube-transcript-api>=1.2.4"

      # 5. Run your script (Ensure your script is named my.py)
      - name: Execute Script
        run: python my.py

      # 6. Push the generated transcript.txt back to GitHub
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all changes (including the new transcript.txt)
          git add -A 
          
          # Check if there are actually changes to commit to avoid errors
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated update: Added/Updated transcript.txt"
            git push
          fi
