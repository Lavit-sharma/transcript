name: Download YouTube Transcript

on:
  workflow_dispatch: # Allows you to click "Run" manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Create Cookies File
        env:
          COOKIE_JSON_DATA: ${{ secrets.YOUTUBE_JSON }}
        run: python convert_cookies.py

      - name: Download Transcript
        run: |
          # --skip-download: Don't download video
          # --write-auto-subs: Get captions
          # --sub-lang en: Target English
          yt-dlp --cookies cookies.txt \
                 --skip-download \
                 --write-auto-subs \
                 --sub-lang "en.*" \
                 --convert-subs srt \
                 "https://www.youtube.com/watch?v=YED8zVXc6As" \
                 -o "transcript"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Find any .srt file generated
          FILE=$(ls transcript*.srt | head -n 1)
          
          if [ -f "$FILE" ]; then
            mv "$FILE" transcript.srt
            git add transcript.srt
            git commit -m "Updated transcript.srt"
            git push
          else
            echo "Transcript not found. Checking for video accessibility..."
            exit 1
          fi
