name: Get Transcript via yt-dlp

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Create Cookies File
        run: |
          cat <<EOF > cookies.txt
          ${{ secrets.YOUTUBE_COOKIES_NETSCAPE }}
          EOF

      - name: Download Transcript
        run: |
          # --skip-download: Don't download the video
          # --write-auto-subs: Get auto-generated captions if manual ones aren't there
          # --sub-lang en: Get English
          # --convert-subs srt: Save as a readable format
          yt-dlp --cookies cookies.txt --skip-download --write-auto-subs --sub-lang en --convert-subs srt "https://www.youtube.com/watch?v=YED8zVXc6As" -o "transcript"

      - name: Commit Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Check for .srt file
          if [ -f transcript.en.srt ]; then
            git add transcript.en.srt
            git commit -m "Downloaded transcript via yt-dlp"
            git push
          fi
