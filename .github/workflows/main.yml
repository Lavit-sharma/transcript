name: Auto Download Transcript

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # FORCING the most stable version for cookie-based bypass
          pip install youtube-transcript-api==1.2.1

      - name: Create Cookies File
        run: |
          cat <<EOF > cookies.json
          ${{ secrets.YOUTUBE_JSON }}
          EOF

      - name: Execute Script
        run: python my.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f transcript.txt ]; then
            git add transcript.txt
            git commit -m "Updated transcript via Stable v1.2.1" || echo "No changes"
            git push
          else
            echo "transcript.txt not found."
            exit 1
          fi
