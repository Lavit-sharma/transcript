name: Download YouTube Transcript

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Create Cookies File
        env:
          COOKIE_JSON_DATA: ${{ secrets.YOUTUBE_JSON }}
        run: python convert_cookies.py

      - name: Download Transcript
        run: |
          # Changed client to 'ios' which is currently more reliable for transcripts
          # Removed 'web' client to avoid PO Token requirement errors
          yt-dlp --cookies cookies.txt \
                 --skip-download \
                 --ignore-no-formats-error \
                 --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1" \
                 --extractor-args "youtube:player_client=ios" \
                 --write-auto-subs \
                 --sub-lang "en.*" \
                 --convert-subs srt \
                 "https://www.youtube.com/watch?v=YED8zVXc6As" \
                 -o "transcript"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use a broad search for the srt file
          FILE=$(find . -name "transcript*.srt" | head -n 1)
          
          if [ -n "$FILE" ] && [ -f "$FILE" ]; then
            echo "Moving $FILE to transcript.srt"
            mv "$FILE" transcript.srt
            git add transcript.srt
            git commit -m "Bypassed PO Token using ios client"
            git push
          else
            echo "No subtitle file found."
            exit 1
          fi
